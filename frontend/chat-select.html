<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Future AI Hub — Chats</title>
  <link rel="stylesheet" href="assets/shared.css">
  <style>
    /* ── Page title matching screenshot exactly ── */
    .chats-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      padding: 18px 16px 10px;
      letter-spacing: 0.2px;
    }

    /* ── Conversation row ── */
    .conv-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #0d1e2e;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .conv-row:active { background: #071824; }

    /* ── Avatar ── */
    .conv-avatar {
      width: 54px; height: 54px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #041220;
      border: 2px solid #1a3a50;
    }
    .conv-avatar-fallback {
      width: 54px; height: 54px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #041828;
      border: 2px solid #1a3a50;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }

    /* ── Right side ── */
    .conv-body { flex: 1; min-width: 0; }

    .conv-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }
    .conv-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--cyan);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .conv-date {
      font-size: 12px;
      color: #4a7a9a;
      flex-shrink: 0;
    }

    /* ── Message preview lines — exactly like the screenshot ── */
    .conv-preview-wrap {
      position: relative;
    }
    .conv-preview-line {
      font-size: 14px;
      color: #8aaabb;
      line-height: 1.5;
      /* Show up to 4 lines, clipped — matching the screenshot's tall preview */
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* When there's only one short line (private chat), show just that */
    .conv-preview-line.single {
      -webkit-line-clamp: 2;
    }

    /* ── Unread badge — top-right corner of row ── */
    .conv-unread {
      position: absolute;
      top: 14px; right: 16px;
      background: #e83a3a;
      color: #fff;
      font-size: 11px; font-weight: 700;
      min-width: 20px; height: 20px;
      border-radius: 10px;
      display: none;
      align-items: center; justify-content: center;
      padding: 0 5px;
    }
    .conv-unread.show { display: flex; }

    /* ── Loading skeleton ── */
    .skel {
      background: linear-gradient(90deg, #0a1e2e 25%, #0f2840 50%, #0a1e2e 75%);
      background-size: 200% 100%;
      animation: skel-shimmer 1.4s infinite;
      border-radius: 6px; height: 14px; margin-bottom: 6px;
    }
    @keyframes skel-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
<div class="dot-bg"></div>

<div class="page">
  <!-- Title matching the screenshot -->
  <div class="chats-title">Chats</div>

  <div id="chat-list">
    <!-- Skeleton while loading -->
    <div class="conv-row" style="pointer-events:none">
      <div class="conv-avatar-fallback" style="background:#0a1e2e;border-color:#0a1e2e;"></div>
      <div class="conv-body">
        <div class="skel" style="width:55%;height:16px;margin-bottom:8px;"></div>
        <div class="skel" style="width:90%;"></div>
        <div class="skel" style="width:75%;"></div>
      </div>
    </div>
    <div class="conv-row" style="pointer-events:none">
      <div class="conv-avatar-fallback" style="background:#0a1e2e;border-color:#0a1e2e;"></div>
      <div class="conv-body">
        <div class="skel" style="width:40%;height:16px;margin-bottom:8px;"></div>
        <div class="skel" style="width:80%;"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<div class="toast" id="toast"></div>
<script src="assets/nav.js"></script>
<script>
  renderNav('chat');

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s || '');
    return d.innerHTML;
  }

  function avatarEl(url, fallbackEmoji) {
    if (url && url.trim()) {
      return `<img class="conv-avatar" src="${esc(url)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
              <div class="conv-avatar-fallback" style="display:none">${fallbackEmoji}</div>`;
    }
    return `<div class="conv-avatar-fallback">${fallbackEmoji}</div>`;
  }

  function buildRow(href, avatarUrl, fallbackEmoji, name, date, previewText, unread) {
    const unreadHtml = unread > 0
      ? `<span class="conv-unread show">${unread > 99 ? '99+' : unread}</span>`
      : '';
    // Multi-line preview like the screenshot for group, single line for private
    const isMultiLine = (previewText || '').length > 50;
    const previewClass = isMultiLine ? 'conv-preview-line' : 'conv-preview-line single';
    const preview = previewText
      ? `<div class="${previewClass}">${esc(previewText)}</div>`
      : `<div class="conv-preview-line single" style="color:#2a4a5a;font-style:italic">No messages yet</div>`;

    return `
      <a class="conv-row" href="${href}">
        ${avatarEl(avatarUrl, fallbackEmoji)}
        <div class="conv-body">
          <div class="conv-top">
            <span class="conv-name">${esc(name)}</span>
            ${date ? `<span class="conv-date">${esc(date)}</span>` : ''}
          </div>
          <div class="conv-preview-wrap">
            ${preview}
          </div>
        </div>
        ${unreadHtml}
      </a>`;
  }

  async function load() {
    try {
      const r = await fetch('/api/chat/previews');
      const d = await r.json();
      if (!d.ok) { window.location.href = 'index.html'; return; }

      const { group, private: priv } = d;

      // ── Group row ─────────────────────────────────────────────────────────
      const groupName   = (group.manager && group.manager.name)
        ? group.manager.name + ' — Group'
        : 'Team Group Chat 🚀🚀🚀';
      const groupAvatar = group.manager ? group.manager.avatar_url : null;
      const groupRow    = buildRow(
        'group-chat.html',
        groupAvatar, '👥',
        groupName,
        group.last_at,
        group.last_message,
        group.unread
      );

      // ── Private row ───────────────────────────────────────────────────────
      const privName   = (group.manager && group.manager.name) ? group.manager.name : 'Manager';
      const privAvatar = group.manager ? group.manager.avatar_url : null;
      const privRow    = buildRow(
        'chat.html',
        privAvatar, '💬',
        privName,
        priv.last_at,
        priv.last_message
          ? ((priv.last_sender === 'user' ? 'You: ' : '') + priv.last_message)
          : null,
        priv.unread
      );

      document.getElementById('chat-list').innerHTML = groupRow + privRow;
    } catch(e) {
      document.getElementById('chat-list').innerHTML =
        '<div style="padding:32px;text-align:center;color:#4a7a9a;">Could not load chats</div>';
    }
  }

  load();
</script>
</body>
  </html>
