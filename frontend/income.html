<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Future AI Hub — Income</title>
  <link rel="stylesheet" href="assets/shared.css">
  <style>
    /* ── SUMMARY CARDS ── */
    .summary-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 14px 12px 4px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border-cyan);
      border-radius: 10px; padding: 14px 12px;
    }
    .summary-lbl { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.3px; }
    .summary-val { font-size: 20px; font-weight: 700; color: var(--cyan); }
    .summary-val.green { color: #44ee88; }

    /* ── SECTION HEADING ── */
    .section-head {
      padding: 16px 12px 6px;
      font-size: 12px; font-weight: 700;
      color: var(--cyan); letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── MACHINE CARD ── */
    .machine-card {
      margin: 0 10px 10px;
      background: var(--surface);
      border: 1px solid var(--border-cyan);
      border-radius: 10px; overflow: hidden;
    }
    .machine-header {
      display: flex; align-items: center;
      background: #001d3322; padding: 10px 14px;
      border-bottom: 1px solid var(--border-cyan); gap: 10px;
    }
    .machine-thumb {
      width: 44px; height: 44px; border-radius: 8px; object-fit: cover;
      background: #041220; border: 1px solid var(--border-cyan); flex-shrink: 0;
    }
    .machine-name { color: var(--cyan); font-size: 14px; font-weight: 700; flex: 1; }
    .machine-status {
      font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
    }
    .s-running { background:#003322; color:#44ee88; border:1px solid #33cc66; }
    .s-expired { background:#220011; color:#ee4444; border:1px solid #cc3333; }

    .machine-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    }
    .mf {
      padding: 10px 14px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .mf:nth-child(even) { border-right: none; }
    .mf:nth-last-child(-n+2) { border-bottom: none; }
    .mf-lbl { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .mf-val { font-size: 13px; color: #d0e8f8; font-weight: 600; }
    .mf-val.g { color: #44ee88; }
    .mf-val.c { color: var(--cyan); }

    /* ── PROGRESS BAR ── */
    .progress-wrap { padding: 10px 14px 12px; border-top: 1px solid var(--border); }
    .progress-lbl { display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom:6px; }
    .progress-track { height:6px; background:#0a1e2e; border-radius:3px; overflow:hidden; }
    .progress-fill  { height:100%; background: var(--cyan); border-radius:3px; transition:width 0.4s; }

    /* ── FILTER TABS ── */
    .filter-row {
      display: flex; gap: 8px; padding: 4px 12px 8px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 5px 13px; border-radius: 20px; flex-shrink: 0;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: var(--surface2); color: var(--text-muted);
      border: 1px solid var(--border); transition: all 0.15s;
    }
    .filter-chip.active { background: var(--cyan); color: #fff; border-color: var(--cyan); }

    /* ── TRANSACTION ROW ── */
    .tx-item {
      margin: 0 10px 6px;
      background: var(--surface);
      border: 1px solid #0d2233;
      border-radius: 8px; padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .tx-icon {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .tx-body { flex: 1; min-width: 0; }
    .tx-type { font-size: 13px; font-weight: 600; color: #c8e4f4; text-transform: capitalize; }
    .tx-note { font-size: 11px; color: var(--text-muted); margin-top: 2px;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-right { text-align: right; flex-shrink: 0; }
    .tx-amount { font-size: 14px; font-weight: 700; }
    .tx-date   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .amount-pos { color: #44ee88; }
    .amount-neg { color: #ee4444; }

    /* ── MORE BUTTON ── */
    .more-btn {
      display: block; margin: 4px 10px 16px;
      padding: 11px; text-align: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; font-weight: 600;
      color: var(--cyan); cursor: pointer;
    }
    .more-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
<div class="dot-bg"></div>

<div class="page">
  <div class="app-bar">
    <span class="app-bar-title">Income</span>
  </div>

  <div class="scroll-area">

    <!-- Summary cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-lbl">AI Income</div>
        <div class="summary-val" id="sum-ai">0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-lbl">Today's Earnings</div>
        <div class="summary-val green" id="sum-today">0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-lbl">Team Income</div>
        <div class="summary-val" id="sum-team">0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-lbl">Total Deposited</div>
        <div class="summary-val" id="sum-dep">0.00</div>
      </div>
    </div>

    <!-- My Machines -->
    <div class="section-head">My Machines</div>
    <div id="owned-list">
      <div class="empty-state"><div class="empty-icon">🖥️</div>No machines purchased yet</div>
    </div>
    <div id="owned-more-btn"></div>

    <!-- Income Records -->
    <div class="section-head" style="margin-top:4px">Transaction History</div>
    <div class="filter-row">
      <div class="filter-chip active" onclick="filterTx('all',this)">All</div>
      <div class="filter-chip" onclick="filterTx('ai_income',this)">AI Income</div>
      <div class="filter-chip" onclick="filterTx('deposit',this)">Deposit</div>
      <div class="filter-chip" onclick="filterTx('withdraw',this)">Withdraw</div>
      <div class="filter-chip" onclick="filterTx('team',this)">Team</div>
      <div class="filter-chip" onclick="filterTx('admin_adjustment',this)">Adjustments</div>
    </div>
    <div id="tx-list">
      <div class="empty-state"><div class="empty-icon">₿</div>No records yet</div>
    </div>
    <div id="tx-more-wrap"></div>

  </div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<div class="toast" id="toast"></div>
<script src="assets/nav.js"></script>
<script>
  renderNav('income');
  const fmt = n => Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

  const TX_ICON = {
    ai_income: {icon:'🤖', bg:'#001a2e'},
    deposit:   {icon:'⬇️', bg:'#001a0a'},
    withdraw:  {icon:'⬆️', bg:'#1a0000'},
    team:      {icon:'👥', bg:'#0a0020'},
    withdraw_refund:  {icon:'↩️', bg:'#1a1000'},
    admin_adjustment: {icon:'⚙️', bg:'#0d0d0d'},
  };

  // ── MACHINES ──────────────────────────────────────────────────────────
  const MACHINES_INITIAL = 3;
  let allMachines = [];

  function renderMachines(showCount) {
    const box = document.getElementById('owned-list');
    const toShow = allMachines.slice(0, showCount);
    box.innerHTML = toShow.map(m => {
      const pct = m.total_income > 0 ? Math.min(100, (m.earned / m.total_income) * 100) : 0;
      const statusCls = m.status === 'running' ? 's-running' : 's-expired';
      const statusLbl = m.status === 'running' ? 'Running' : 'Expired';
      return `
        <div class="machine-card">
          <div class="machine-header">
            <img class="machine-thumb" src="${m.image_url||'assets/images/A1_Machine.jpg'}"
                 alt="${m.machine_id}" onerror="this.style.visibility='hidden'">
            <span class="machine-name">${m.machine_id}</span>
            <span class="machine-status ${statusCls}">${statusLbl}</span>
          </div>
          <div class="machine-grid">
            <div class="mf"><div class="mf-lbl">Purchase Price</div><div class="mf-val">${fmt(m.price)}</div></div>
            <div class="mf"><div class="mf-lbl">Lock Period</div><div class="mf-val">${m.lock} Days</div></div>
            <div class="mf"><div class="mf-lbl">Total Income</div><div class="mf-val c">${fmt(m.total_income)}</div></div>
            <div class="mf"><div class="mf-lbl">Daily Approx.</div><div class="mf-val g">${fmt(m.daily_income)}</div></div>
            <div class="mf"><div class="mf-lbl">Earned</div><div class="mf-val g">${fmt(m.earned)}</div></div>
            <div class="mf"><div class="mf-lbl">Expires</div><div class="mf-val">${m.end_date||'—'}</div></div>
          </div>
          <div class="progress-wrap">
            <div class="progress-lbl"><span>Progress</span><span>${pct.toFixed(1)}%</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </div>`;
    }).join('');

    const moreWrap = document.getElementById('owned-more-btn');
    if (allMachines.length > showCount) {
      moreWrap.innerHTML = `<div class="more-btn" onclick="renderMachines(${showCount + MACHINES_INITIAL})">
        Show More (${allMachines.length - showCount} remaining)
      </div>`;
    } else {
      moreWrap.innerHTML = '';
    }
  }

  // ── TRANSACTIONS ──────────────────────────────────────────────────────
  const TX_INITIAL = 10;
  const TX_STEP    = 10;
  let allTx        = [];
  let filteredTx   = [];
  let shownTx      = TX_INITIAL;

  function filterTx(type, el) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filteredTx = type === 'all' ? allTx : allTx.filter(t => t.type === type);
    shownTx = TX_INITIAL;
    renderTx();
  }

  function renderTx() {
    const list = document.getElementById('tx-list');
    const moreWrap = document.getElementById('tx-more-wrap');
    if (!filteredTx.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">₿</div>No records for this filter</div>';
      moreWrap.innerHTML = '';
      return;
    }
    const toShow = filteredTx.slice(0, shownTx);
    list.innerHTML = toShow.map(t => {
      const pos    = parseFloat(t.amount) >= 0;
      const meta   = TX_ICON[t.type] || {icon:'💰', bg:'#0a0a0a'};
      const label  = (t.type||'').replace(/_/g,' ');
      const date   = (t.created_at||'').split(' ')[0];
      return `
        <div class="tx-item">
          <div class="tx-icon" style="background:${meta.bg}">${meta.icon}</div>
          <div class="tx-body">
            <div class="tx-type">${label}</div>
            ${t.note ? `<div class="tx-note">${t.note}</div>` : ''}
          </div>
          <div class="tx-right">
            <div class="tx-amount ${pos ? 'amount-pos':'amount-neg'}">${pos?'+':''}${fmt(t.amount)}</div>
            <div class="tx-date">${date}</div>
          </div>
        </div>`;
    }).join('');

    if (filteredTx.length > shownTx) {
      const rem = filteredTx.length - shownTx;
      moreWrap.innerHTML = `<div class="more-btn" onclick="loadMore()">
        Show More (${rem} remaining)
      </div>`;
    } else {
      moreWrap.innerHTML = '';
    }
  }

  function loadMore() {
    shownTx += TX_STEP;
    renderTx();
  }

  // ── SUMMARY ───────────────────────────────────────────────────────────
  // Single fetch replaces the previous 3 separate calls (/api/me,
  // /api/my-machines, /api/transactions) — one DB round trip instead of three.
  async function loadAll() {
    try {
      const r = await fetch('/api/income-summary');
      const d = await r.json();
      if (!d.ok) return;

      // Summary cards
      const u = d.user;
      document.getElementById('sum-ai').textContent    = fmt(u.ai_income);
      document.getElementById('sum-today').textContent = fmt(u.today_earnings);
      document.getElementById('sum-team').textContent  = fmt(u.team_income);
      document.getElementById('sum-dep').textContent   = fmt(u.total_deposit);

      // Machines
      if (d.machines && d.machines.length) {
        allMachines = d.machines;
        renderMachines(MACHINES_INITIAL);
      }

      // Transactions
      if (d.transactions) {
        allTx      = d.transactions;
        filteredTx = allTx;
        renderTx();
      }
    } catch(e) {}
  }

  loadAll();
</script>
</body>
</html>
