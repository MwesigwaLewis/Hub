<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Future AI Hub — Group Chat</title>
  <link rel="stylesheet" href="assets/shared.css">
  <style>
    .chat-page { display: flex; flex-direction: column; height: 100vh; }
    .chat-scroll {
      flex: 1; overflow-y: auto; padding: 12px 10px 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .bubble-row { display: flex; }
    .bubble {
      max-width: 82%;
      padding: 10px 13px;
      border-radius: 14px;
      font-size: 14px; line-height: 1.4;
      white-space: pre-wrap; word-break: break-word;
    }
    .bubble-row.theirs .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: #eaf6ff;
      border-bottom-left-radius: 4px;
    }
    .bubble-time {
      font-size: 10px; color: #3a5a7a; margin-top: 3px; padding: 0 4px;
    }
    .read-only-notice {
      text-align: center; padding: 12px 16px;
      font-size: 12px; color: var(--text-muted);
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
  </style>
</head>
<body>
<div class="dot-bg"></div>

<div class="page chat-page">
  <div class="app-bar" style="gap:10px;">
    <a href="chat-select.html" class="back-btn">‹</a>
    <img id="mgr-avatar" src="assets/icon-512.png" alt=""
         style="width:34px;height:34px;border-radius:50%;object-fit:cover;
                border:2px solid var(--cyan);flex-shrink:0;"
         onerror="this.src='assets/icon-512.png'">
    <div style="flex:1;min-width:0;">
      <div class="app-bar-title" id="mgr-name" style="font-size:15px;">Group Chat</div>
      <div style="font-size:11px;color:var(--text-muted);">Team broadcast from your manager</div>
    </div>
  </div>

  <div class="chat-scroll" id="chat-scroll">
    <div class="empty-state" id="chat-empty">
      <div class="empty-icon">👥</div>
      No group messages yet — your manager will broadcast here.
    </div>
  </div>

  <div class="read-only-notice">
    🔒 This is a read-only broadcast channel. Reply in Manager Chat for private support.
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="assets/nav.js"></script>
<script>
  const scrollEl = document.getElementById('chat-scroll');
  const emptyEl  = document.getElementById('chat-empty');

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderMessages(messages, managerName) {
    if (!messages.length) { emptyEl.style.display = 'flex'; return; }
    emptyEl.style.display = 'none';
    scrollEl.querySelectorAll('.bubble-row').forEach(el => el.remove());
    messages.forEach(m => {
      const row = document.createElement('div');
      row.className = 'bubble-row theirs';
      row.innerHTML = `
        <div>
          <div class="bubble">${esc(m.body)}</div>
          <div class="bubble-time">${managerName || 'Manager'} · ${m.created_at || ''}</div>
        </div>`;
      scrollEl.appendChild(row);
    });
    scrollEl.scrollTop = scrollEl.scrollHeight;
  }

  async function load() {
    try {
      const r = await fetch('/api/chat/group/messages');
      if (r.status === 403) {
        const empty = document.getElementById('chat-empty');
        empty.innerHTML = '<div class="empty-icon">🔒</div>Group chat has been disabled by your manager.';
        empty.style.display = 'flex';
        return;
      }
      const d = await r.json();
      if (!d.ok) { window.location.href = 'index.html'; return; }
      // Icon: use group_icon if set, otherwise fall back to app icon
      document.getElementById('mgr-avatar').src = d.group_icon || 'assets/icon-192.png';
      // Name
      if (d.group_name) {
        document.getElementById('mgr-name').textContent = d.group_name;
      } else if (d.manager) {
        document.getElementById('mgr-name').textContent = d.manager.name + ' Group';
      }
      renderMessages(d.messages, d.manager ? d.manager.name : 'Manager');
    } catch(e) {}
  }

  load();
  setInterval(load, 8000);
  lucide.createIcons();
</script>
</body>
</html>
